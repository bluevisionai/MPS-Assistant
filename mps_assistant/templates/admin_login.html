<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }} Admin Login</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --danger: #f87171;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 20%, #1f2937 0%, var(--bg) 55%);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
      }
      .card {
        width: min(420px, calc(100vw - 2rem));
        background: color-mix(in oklab, var(--card) 88%, black 12%);
        border: 1px solid #374151;
        border-radius: 14px;
        padding: 1.25rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin: 0.65rem 0 0.35rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #4b5563;
        background: #0b1220;
        color: var(--text);
        border-radius: 8px;
        padding: 0.65rem 0.75rem;
      }
      button {
        margin-top: 1rem;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
        padding: 0.7rem 0.8rem;
        cursor: pointer;
      }
      .error {
        margin-top: 0.6rem;
        color: var(--danger);
        font-size: 0.9rem;
      }
      .help {
        margin-top: 0.8rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Internal Dashboard Login</h1>
      <p>Restricted area for internal staff only.</p>
      <form method="post" action="/admin/login">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <div class="help">Set ADMIN_DASHBOARD_USERNAME and ADMIN_DASHBOARD_PASSWORD in your environment.</div>
    </main>
  </body>
</html>
