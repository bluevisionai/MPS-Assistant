<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }} Internal Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #dbe2ea;
        --accent: #0ea5e9;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 1rem;
      }
      .top {
        display: flex;
        gap: 0.7rem;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
      }
      .btn {
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 9px;
        padding: 0.55rem 0.8rem;
        cursor: pointer;
      }
      .btn-primary {
        border-color: color-mix(in oklab, var(--accent) 55%, black 0%);
        background: var(--accent);
        color: white;
        font-weight: 600;
      }
      .grid {
        display: grid;
        gap: 0.7rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.85rem;
      }
      .label {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .value {
        margin-top: 0.25rem;
        font-size: 1.2rem;
        font-weight: 700;
      }
      .section {
        margin-top: 0.9rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.85rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 0.5rem;
        border-top: 1px solid #eef2f7;
      }
      th {
        color: var(--muted);
      }
      .muted {
        color: var(--muted);
      }
      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div>
          <h1 style="margin:0;">Internal Analytics Dashboard</h1>
          <div id="stamp" class="muted">Loading...</div>
        </div>
        <div class="actions">
          <button id="refresh" class="btn btn-primary" type="button">Refresh</button>
          <form method="post" action="/admin/logout" style="margin:0;">
            <button class="btn" type="submit">Sign out</button>
          </form>
        </div>
      </header>

      <section id="kpis" class="grid"></section>

      <section class="section">
        <h2 style="margin-top:0;">Recent Activity</h2>
        <table>
          <thead><tr><th>Metric</th><th>Value</th></tr></thead>
          <tbody id="activity"></tbody>
        </table>
      </section>

      <section class="section">
        <h2 style="margin-top:0;">Top Gap Topics</h2>
        <table>
          <thead><tr><th>Topic</th><th>Count</th><th>Unresolved</th></tr></thead>
          <tbody id="gaps"></tbody>
        </table>
      </section>

      <p id="error" class="error"></p>
    </div>

    <script>
      const kpisEl = document.getElementById("kpis")
      const activityEl = document.getElementById("activity")
      const gapsEl = document.getElementById("gaps")
      const stampEl = document.getElementById("stamp")
      const errorEl = document.getElementById("error")
      const refreshBtn = document.getElementById("refresh")

      async function fetchJson(url) {
        const response = await fetch(url, { credentials: "same-origin" })
        if (response.status === 401) {
          location.href = "/admin/login"
          throw new Error("Not authenticated")
        }
        if (!response.ok) {
          const text = await response.text()
          throw new Error(text || "Request failed")
        }
        return response.json()
      }

      function renderKpis(kpis) {
        kpisEl.innerHTML = ""
        for (const item of (kpis || [])) {
          const card = document.createElement("article")
          card.className = "card"
          card.innerHTML = `<div class="label">${item.label || "Metric"}</div><div class="value">${item.value || "0"}</div><div class="muted">${item.delta || ""}</div>`
          kpisEl.appendChild(card)
        }
      }

      function renderActivity(rows) {
        activityEl.innerHTML = ""
        for (const item of (rows || [])) {
          const tr = document.createElement("tr")
          tr.innerHTML = `<td>${item.label || ""}</td><td>${item.value ?? 0}</td>`
          activityEl.appendChild(tr)
        }
      }

      function renderGaps(rows) {
        gapsEl.innerHTML = ""
        for (const item of (rows || [])) {
          const tr = document.createElement("tr")
          tr.innerHTML = `<td>${item.topic || ""}</td><td>${item.count ?? 0}</td><td>${item.unresolved_count ?? 0}</td>`
          gapsEl.appendChild(tr)
        }
      }

      async function load() {
        errorEl.textContent = ""
        try {
          const [analytics, gaps] = await Promise.all([
            fetchJson("/api/analytics"),
            fetchJson("/api/gaps?top=10"),
          ])
          renderKpis(analytics.kpis)
          renderActivity(analytics.recent_activity)
          renderGaps(gaps.topics)
          stampEl.textContent = analytics.last_refresh_completed_at
            ? `Last refresh: ${new Date(analytics.last_refresh_completed_at).toLocaleString()}`
            : "No refresh timestamp available"
        } catch (error) {
          errorEl.textContent = String(error.message || error)
        }
      }

      refreshBtn.addEventListener("click", load)
      load()
    </script>
  </body>
</html>
