<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#24305e" />
    <title>{{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-app-name="{{ app_name }}">
    <div class="site-backdrop" aria-hidden="true"></div>
    <div class="site-overlay" aria-hidden="true"></div>

    <main class="experience-shell">
      <div class="chatbox-shell is-open" id="chatbox-shell">
        <button class="chat-launcher hidden" id="chat-launcher" type="button">Open Medical Protection chat</button>

        <section class="chatbox-panel" aria-label="Medical Protection chat window">
          <header class="chatbox-header">
            <div class="brand-lockup">
              <img
                class="brand-logo"
                src="/static/brand/mps-logo.png"
                alt="Medical Protection logo"
              />
              <div class="brand-copy">
                <p class="eyebrow">Medical Protection</p>
                <h1>Chat assistant</h1>
              </div>
            </div>

            <div class="header-actions">
              <div class="header-actions-pair">
                <button class="primary-button header-apply-button" id="open-application" type="button">Apply now</button>
                <button class="icon-button" id="new-chat" type="button">New chat</button>
              </div>
              <button class="icon-button header-hide-button" id="toggle-chatbox" type="button" aria-expanded="true">Hide</button>
            </div>
          </header>

          <div class="chatbox-body">

            <section class="analytics-dashboard hidden" id="analytics-dashboard" aria-live="polite"></section>

            <div class="messages-stage" id="messages-stage">
              <div class="messages-list" id="chat-messages" aria-live="polite"></div>
              <section class="application-stage hidden" id="application-stage" aria-live="polite"></section>
              <div class="typing-indicator hidden" id="typing-indicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <p>Thinking...</p>
              </div>
            </div>

            <form id="chat-form" class="composer">
              <label for="question-input" class="sr-only">Your message</label>
              <div class="composer-shell">
                <textarea
                  id="question-input"
                  name="question"
                  rows="1"
                  placeholder="Type your question here"
                ></textarea>
                <button class="primary-button send-button" id="ask-button" type="submit">Send</button>
              </div>
              <p class="composer-note hidden" id="composer-note"></p>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
